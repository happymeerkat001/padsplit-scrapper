<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PadSplit Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --success: #22c55e;
      --warn: #fbbf24;
      --error: #f87171;
      --text: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(34,197,94,0.08), transparent 30%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem clamp(1rem, 4vw, 2.5rem);
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    h1 { margin: 0; font-size: 1.6rem; letter-spacing: 0.01em; }
    .pill {
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: rgba(56,189,248,0.12);
      color: var(--accent);
      font-size: 0.9rem;
    }
    .muted { color: var(--muted); font-size: 0.95rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }
    .section {
      margin-bottom: 2rem;
    }
    .section h2 {
      margin: 0 0 0.75rem;
      font-size: 1.2rem;
      letter-spacing: 0.01em;
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 14px 40px rgba(15,23,42,0.4);
    }
    .card h3 { margin: 0 0 0.35rem; font-size: 1rem; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 8px;
      font-size: 0.75rem;
      background: rgba(56,189,248,0.15);
      color: var(--accent);
      margin-left: 0.4rem;
    }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; }
    .chip {
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: rgba(148,163,184,0.2);
      color: var(--muted);
    }
    .status {
      font-weight: 600;
      color: var(--text);
    }
    .error { color: var(--error); }
    .warn { color: var(--warn); }
    .success { color: var(--success); }
    footer {
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .loading { text-align: center; padding: 2rem; color: var(--muted); }
    .chat-box { margin-top: 0.75rem; padding: 0.75rem; border: 1px solid rgba(148,163,184,0.25); border-radius: 10px; background: rgba(255,255,255,0.02); }
    .chat-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .chat-controls select, .chat-controls input { padding: 0.35rem 0.5rem; border-radius: 8px; border: 1px solid rgba(148,163,184,0.35); background: #0b1222; color: var(--text); }
    .chat-controls button { padding: 0.4rem 0.85rem; border-radius: 8px; border: none; background: var(--accent); color: #0b1222; font-weight: 600; cursor: pointer; }
    .chat-controls button:disabled { opacity: 0.6; cursor: not-allowed; }
    .chat-messages { display: flex; flex-direction: column; gap: 0.3rem; max-height: 200px; overflow-y: auto; }
    .chat-msg { padding: 0.4rem 0.6rem; border-radius: 8px; background: rgba(148,163,184,0.12); }
    .role-owner { color: #38bdf8; }
    .role-manager { color: #22c55e; }
    .role-repairman { color: #f59e0b; }
    .msg-meta { font-size: 0.75rem; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.4rem 0.6rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid rgba(148,163,184,0.15); }
    td { padding: 0.4rem 0.6rem; border-bottom: 1px solid rgba(148,163,184,0.08); }
    .temp-high { color: var(--error); }
    .temp-ok   { color: var(--success); }
    details summary {
      cursor: pointer;
      user-select: none;
      list-style: none;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary h2 { display: inline-block; margin: 0 0 0.75rem; }
  </style>
</head>
<body>
  <header>
    <h1>PadSplit Dashboard</h1>
    <span class="pill" id="last-updated">Loading…</span>
    <span class="muted" id="refresh-info">Auto-refresh in 300s</span>
  </header>

  <div id="content">
    <div class="loading">Fetching latest.json …</div>
  </div>

  <div id="thermostat-section">
    <div class="loading">Fetching thermostat data…</div>
  </div>

  <footer>
    Data auto-refreshes every 5 minutes from <code>padsplit_scraper/output/latest.json</code>. Pages is public; repo history stays private.
    <div style="margin-top:0.5rem; font-size:0.9rem;"><a href="./private-messages.html" style="color:#94a3b8; text-decoration:underline;">Message Archive</a></div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Paste your Firebase config keys here (all fields required)
    const firebaseConfig = {
      apiKey: "AIzaSyCSWOHI6QLqugy_Fao2p4bBehg02_fu3No",
      authDomain: "padsplit-scrapper.firebaseapp.com",
      projectId: "padsplit-scrapper",
      storageBucket: "padsplit-scrapper.firebasestorage.app",
      messagingSenderId: "281696703679",
      appId: "1:281696703679:web:f94ba04e92cb43b4f9a20a"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const REFRESH_SEC = 300;
    let counter = REFRESH_SEC;
    const refreshInfo = document.getElementById('refresh-info');
    const taskMessageContainers = new Map();

    setInterval(() => {
      counter -= 1;
      if (counter <= 0) {
        location.reload();
      } else {
        refreshInfo.textContent = `Auto-refresh in ${counter}s`;
      }
    }, 1000);

    function fmtDate(s) {
      if (!s) return '—';
      const d = new Date(s);
      return isNaN(d.getTime()) ? s : d.toLocaleString();
    }

    function render(data) {
      const root = document.createElement('div');

      // Header info
      const last = document.getElementById('last-updated');
      last.textContent = `Updated ${fmtDate(data.scraped_at)}`;

      // Tasks
      const taskSection = document.createElement('div');
      taskSection.className = 'section';
      const taskDetails = document.createElement('details');
      const taskSummary = document.createElement('summary');
      taskSummary.innerHTML = '<h2>Tasks</h2>';
      taskDetails.appendChild(taskSummary);
      const tasks = data.tasks || {};
      Object.keys(tasks).forEach(bucket => {
        const bucketDiv = document.createElement('div');
        bucketDiv.className = 'card';
        bucketDiv.innerHTML = `<div class="flex-between"><h3>${bucket}</h3><span class="badge">${tasks[bucket].length}</span></div>`;
        tasks[bucket].forEach(t => {
          const taskId = t.id || `${bucket}-${Math.random().toString(16).slice(2)}`;
          const row = document.createElement('div');
          row.style.marginTop = '0.5rem';
          row.innerHTML = `
            <div class="flex-between">
              <div class="status">${t.category || 'Task'}</div>
              <span class="chip">${t.status || 'unknown'}</span>
            </div>
            <div class="muted">${t.details || t.description || 'No details'}</div>
            <div class="chips">
              ${t.property_address?.street1 ? `<span class="chip">${t.property_address.street1}</span>` : ''}
              ${t.location ? `<span class="chip">${t.location}</span>` : ''}
            </div>
          `;

          const chatBox = document.createElement('div');
          chatBox.className = 'chat-box';
          const controls = document.createElement('div');
          controls.className = 'chat-controls';
          controls.innerHTML = `
            <select data-role>
              <option value="Owner">Owner</option>
              <option value="Manager">Manager</option>
              <option value="Repairman">Repairman</option>
            </select>
            <input data-msg placeholder="Type a message" />
            <button data-send>Send</button>
          `;
          const messagesDiv = document.createElement('div');
          messagesDiv.className = 'chat-messages';
          messagesDiv.dataset.taskId = taskId;
          taskMessageContainers.set(taskId, messagesDiv);

          const sendBtn = controls.querySelector('[data-send]');
          const msgInput = controls.querySelector('[data-msg]');

          sendBtn.addEventListener('click', async () => {
            const role = controls.querySelector('[data-role]').value;
            const text = msgInput.value.trim();
            if (!text) return;
            sendBtn.disabled = true;
            try {
              await addDoc(collection(db, "task_messages"), {
                taskId,
                role,
                text,
                created: serverTimestamp(),
              });
              msgInput.value = "";
            } catch (err) {
              console.error("Failed to send message", err);
              alert("Failed to send message");
            } finally {
              sendBtn.disabled = false;
            }
          });

          chatBox.appendChild(controls);
          chatBox.appendChild(messagesDiv);
          row.appendChild(chatBox);
          bucketDiv.appendChild(row);
        });
        taskDetails.appendChild(bucketDiv);
      });
      taskSection.appendChild(taskDetails);
      root.appendChild(taskSection);

      const container = document.getElementById('content');
      container.innerHTML = '';
      container.appendChild(root);
    }

    function renderThermostats(data) {
      const section = document.getElementById('thermostat-section');
      const rows = (data.locations || []).flatMap(loc =>
        (loc.devices || []).map(d => ({ ...d, location_id: loc.id, location_name: loc.name }))
      );

      let html = `
        <div class="section">
          <details open>
            <summary>
              <div class="flex-between" style="margin-bottom:0.75rem">
                <h2>Thermostats</h2>
                <span class="muted" style="font-size:0.85rem">Updated ${fmtDate(data.scraped_at)}</span>
              </div>
            </summary>
          <div class="card">
            <table>
              <thead>
                <tr>
                  <th>Property</th>
                  <th>Temp</th>
                  <th>Heat Set</th>
                  <th>Cool Set</th>
                  <th>Humidity</th>
                  <th>Outdoor</th>
                </tr>
              </thead>
              <tbody>`;

      rows.forEach(d => {
        const temp = d.temp ?? '—';
        const tempClass = d.temp >= 78 ? 'temp-high' : d.temp <= 65 ? 'temp-ok' : '';
        html += `
                <tr>
                  <td>${d.location_name || d.name || d.location_id}</td>
                  <td class="${tempClass}">${temp !== '—' ? temp + '°F' : '—'}</td>
                  <td>${d.heat_setpoint != null ? d.heat_setpoint + '°F' : '—'}</td>
                  <td>${d.cool_setpoint != null ? d.cool_setpoint + '°F' : '—'}</td>
                  <td>${d.humidity != null ? d.humidity + '%' : '—'}</td>
                  <td>${d.outdoor_temp != null ? d.outdoor_temp + '°F' : '—'}</td>
                </tr>`;
      });

      html += `</tbody></table></div></details></div>`;
      section.innerHTML = html;
    }

    fetch('./thermostat/latest.json', { cache: 'no-cache' })
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(renderThermostats)
      .catch(err => {
        document.getElementById('thermostat-section').innerHTML =
          `<div class="card error" style="margin-bottom:1rem">Thermostat data unavailable (${err.message}).</div>`;
      });

    fetch('./data/latest.json', { cache: 'no-cache' })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(render)
      .catch(err => {
        document.getElementById('content').innerHTML =
          `<div class="card error">Failed to load latest.json (${err.message}).</div>`;
        console.error(err);
      });

    // Real-time listener for task messages
    const q = query(collection(db, "task_messages"), orderBy("created", "asc"));
    onSnapshot(q, (snapshot) => {
      snapshot.docChanges().forEach(change => {
        if (change.type === "added") {
          const data = change.doc.data();
          const container = taskMessageContainers.get(data.taskId);
          if (!container) return;
          const roleClass = data.role === "Manager" ? "role-manager" : data.role === "Repairman" ? "role-repairman" : "role-owner";
          const created = data.created?.toDate ? data.created.toDate() : data.created;
          const msgDiv = document.createElement('div');
          msgDiv.className = `chat-msg ${roleClass}`;
          msgDiv.innerHTML = `
            <div><strong>${data.role || 'Role'}:</strong> ${data.text || ''}</div>
            <div class="msg-meta">${created ? fmtDate(created) : ''}</div>
          `;
          container.appendChild(msgDiv);
          container.scrollTop = container.scrollHeight;
        }
      });
    });
  </script>
</body>
</html>
