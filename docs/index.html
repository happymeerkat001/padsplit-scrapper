<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PadSplit Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --success: #22c55e;
      --warn: #fbbf24;
      --error: #f87171;
      --text: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(34,197,94,0.08), transparent 30%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem clamp(1rem, 4vw, 2.5rem);
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    h1 { margin: 0; font-size: 1.6rem; letter-spacing: 0.01em; }
    .pill {
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: rgba(56,189,248,0.12);
      color: var(--accent);
      font-size: 0.9rem;
    }
    .muted { color: var(--muted); font-size: 0.95rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }
    .section {
      margin-bottom: 2rem;
    }
    .section h2 {
      margin: 0 0 0.75rem;
      font-size: 1.2rem;
      letter-spacing: 0.01em;
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 14px 40px rgba(15,23,42,0.4);
    }
    .card h3 { margin: 0 0 0.35rem; font-size: 1rem; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 8px;
      font-size: 0.75rem;
      background: rgba(56,189,248,0.15);
      color: var(--accent);
      margin-left: 0.4rem;
    }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; }
    .chip {
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: rgba(148,163,184,0.2);
      color: var(--muted);
    }
    .status {
      font-weight: 600;
      color: var(--text);
    }
    .error { color: var(--error); }
    .warn { color: var(--warn); }
    .success { color: var(--success); }
    .last-message { margin: 0.35rem 0; color: var(--muted); }
    footer {
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .loading { text-align: center; padding: 2rem; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>PadSplit Dashboard</h1>
    <span class="pill" id="last-updated">Loading…</span>
    <span class="muted" id="refresh-info">Auto-refresh in 300s</span>
  </header>

  <div id="content">
    <div class="loading">Fetching latest.json …</div>
  </div>

  <footer>
    Data auto-refreshes every 5 minutes from <code>padsplit_scraper/output/latest.json</code>. Pages is public; repo history stays private.
  </footer>

  <script>
    const REFRESH_SEC = 300;
    let counter = REFRESH_SEC;
    const refreshInfo = document.getElementById('refresh-info');

    setInterval(() => {
      counter -= 1;
      if (counter <= 0) {
        location.reload();
      } else {
        refreshInfo.textContent = `Auto-refresh in ${counter}s`;
      }
    }, 1000);

    function fmtDate(s) {
      if (!s) return '—';
      const d = new Date(s);
      return isNaN(d.getTime()) ? s : d.toLocaleString();
    }

    function render(data) {
      const root = document.createElement('div');

      // Header info
      const last = document.getElementById('last-updated');
      last.textContent = `Updated ${fmtDate(data.scraped_at)}`;

      // Messages
      const msgSection = document.createElement('div');
      msgSection.className = 'section';
      msgSection.innerHTML = '<h2>Messages</h2>';
      const msgGrid = document.createElement('div');
      msgGrid.className = 'grid';
      (data.messages || []).forEach(msg => {
        const card = document.createElement('div');
        card.className = 'card';
        const title = msg.title || 'Untitled chat';
        const unread = msg.member?.isUnread || msg.unread || msg.unreadCount > 0;
        card.innerHTML = `
          <div class="flex-between">
            <h3>${title}</h3>
            ${unread ? '<span class="badge">Unread</span>' : ''}
          </div>
          <p class="last-message">${msg.lastMessage?.text || msg.lastMessage?.body || 'No messages yet.'}</p>
          <div class="chips">
            <span class="chip">${msg.property?.address?.street1 || msg.property?.name || 'Unknown property'}</span>
            <span class="chip">${fmtDate(msg.lastMessage?.created || msg.lastMessage?.createdAt)}</span>
          </div>
        `;
        msgGrid.appendChild(card);
      });
      msgSection.appendChild(msgGrid);
      root.appendChild(msgSection);

      // Tasks
      const taskSection = document.createElement('div');
      taskSection.className = 'section';
      taskSection.innerHTML = '<h2>Tasks</h2>';
      const tasks = data.tasks || {};
      Object.keys(tasks).forEach(bucket => {
        const bucketDiv = document.createElement('div');
        bucketDiv.className = 'card';
        bucketDiv.innerHTML = `<div class="flex-between"><h3>${bucket}</h3><span class="badge">${tasks[bucket].length}</span></div>`;
        tasks[bucket].forEach(t => {
          const row = document.createElement('div');
          row.style.marginTop = '0.5rem';
          row.innerHTML = `
            <div class="flex-between">
              <div class="status">${t.category || 'Task'}</div>
              <span class="chip">${t.status || 'unknown'}</span>
            </div>
            <div class="muted">${t.details || t.description || 'No details'}</div>
            <div class="chips">
              ${t.location ? `<span class="chip">${t.location}</span>` : ''}
              ${t.id ? `<span class="chip">ID: ${t.id}</span>` : ''}
            </div>
          `;
          bucketDiv.appendChild(row);
        });
        taskSection.appendChild(bucketDiv);
      });
      root.appendChild(taskSection);

      const container = document.getElementById('content');
      container.innerHTML = '';
      container.appendChild(root);
    }

    fetch('./data/latest.json', { cache: 'no-cache' })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(render)
      .catch(err => {
        document.getElementById('content').innerHTML =
          `<div class="card error">Failed to load latest.json (${err.message}).</div>`;
        console.error(err);
      });
  </script>
</body>
</html>
